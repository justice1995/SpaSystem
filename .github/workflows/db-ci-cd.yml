name: Database CI/CD

on:
  push:
    branches:
      - develop
    paths:
      - 'services/BookingService/Booking/BookingDatabase/**'

jobs:
  deploy-db:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Sử dụng VSTest để định vị đường dẫn MSBuild chuẩn của Visual Studio 2022
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build SQL Project
        run: |
          msbuild services/BookingService/Booking/BookingDatabase/BookingDatabase.sqlproj /p:Configuration=Release /p:VisualStudioVersion=17.0 /p:SqlServerVerification=False

      - name: Deploy DACPAC
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: services/BookingService/Booking/BookingDatabase/bin/Release/BookingDatabase.dacpac
