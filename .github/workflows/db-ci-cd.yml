name: Database CI/CD

on:
  push:
    branches:
      - develop
    paths:
      - 'services/BookingService/Booking/BookingDatabase/**'

jobs:
  deploy-db:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Sử dụng lệnh dotnet để build dự án SQL thành file .dacpac
      # Lệnh này gọi trực tiếp SqlPackage thông qua dotnet, tránh lỗi MSBuild cũ
      - name: Build SQL Project
        run: |
          dotnet tool install -g Microsoft.SqlPackage
          sqlpackage /Action:Extract /SourceConnectionString:"Data Source=(localdb)\MSSQLLocalDB;Initial Catalog=master;Integrated Security=true" /TargetFile:BookingDatabase.dacpac
          # Hoặc cách tốt hơn cho SQL Project là dùng lệnh build trực tiếp vào bin:
          dotnet build services/BookingService/Booking/BookingDatabase/BookingDatabase.sqlproj /p:Configuration=Release

      - name: Deploy DACPAC
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: services/BookingService/Booking/BookingDatabase/bin/Release/BookingDatabase.dacpac
