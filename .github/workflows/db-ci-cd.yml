name: Database CI/CD

on:
  push:
    branches:
      - develop
    paths:
      - 'services/BookingService/Booking/BookingDatabase/**'

jobs:

  deploy-db:

    runs-on: windows-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install SqlPackage
        uses: microsoft/sqlpackage-action@v1

      - name: Build SQL Project
        shell: cmd
        run: |
          msbuild services\BookingService\Booking\BookingDatabase\BookingDatabase.sqlproj /p:Configuration=Release

      - name: Deploy DACPAC
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: services/BookingService/Booking/BookingDatabase/bin/Release/BookingDatabase.dacpac
