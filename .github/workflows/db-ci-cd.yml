name: Database CI/CD

on:
  push:
    branches:
      - develop
    paths:
      - 'services/BookingService/Booking/BookingDatabase/**'

jobs:
  deploy-db:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SqlPackage
        run: dotnet tool install -g Microsoft.SqlPackage

      - name: Build SQL Project
        # Chuyển từ dotnet build sang sqlpackage build trực tiếp
        run: |
          sqlpackage /Action:Build /SourceFile:services/BookingService/Booking/BookingDatabase/BookingDatabase.sqlproj /TargetFile:BookingDatabase.dacpac

      - name: Deploy DACPAC
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: ./BookingDatabase.dacpac
