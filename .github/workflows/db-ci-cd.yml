name: Database CI/CD

on:

  push:

    branches:

      - develop

    paths:

      - 'database/**'

jobs:

  deploy-db:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup .NET

        uses: actions/setup-dotnet@v4

        with:

          dotnet-version: 8.0.x

      - name: Build SQL Project

        run: dotnet build database/BookingDatabase.sqlproj -c Release

      - name: Deploy DACPAC

        uses: azure/sql-action@v2

        with:

          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}

          path: database/bin/Release/BookingDatabase.dacpac
