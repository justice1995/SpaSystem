name: Database CI/CD

on:
  push:
    branches:
      - develop
    paths:
      - 'services/BookingService/Booking/BookingDatabase/**'

jobs:
  deploy-db:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Bắt buộc phải cài đặt thành phần build của SQL Project
      - name: Install SqlServer.SqlProj.Extensions
        run: dotnet add services/BookingService/Booking/BookingDatabase/BookingDatabase.sqlproj package Microsoft.Build.Sql

      - name: Build SQL Project
        # Sử dụng MSBuild với tham số để tìm các tệp .targets của SQL
        run: |
          msbuild services/BookingService/Booking/BookingDatabase/BookingDatabase.sqlproj /p:Configuration=Release /p:VisualStudioVersion=17.0

      - name: Deploy DACPAC
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: services/BookingService/Booking/BookingDatabase/bin/Release/BookingDatabase.dacpac
